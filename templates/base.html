<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Bank Reconciler{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='app.css') }}" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/">
      <i class="bi bi-bank me-2"></i>Bank Reconciler
    </a>
    <div class="navbar-text text-white-50 small me-auto">
    </div>
    <a href="/nicknames" class="btn btn-outline-light btn-sm ms-3">
      <i class="bi bi-tags me-1"></i> Nicknames
    </a>
    <a href="/settings" class="btn btn-outline-light btn-sm ms-2">
      <i class="bi bi-gear me-1"></i> Settings
    </a>
    <form method="POST" action="/shutdown" class="ms-3"
          onsubmit="return confirm('Shut down the reconciler server?')">
      <button type="submit" class="btn btn-outline-light btn-sm">
        <i class="bi bi-power me-1"></i> Shut Down
      </button>
    </form>
  </div>
</nav>

<main class="container py-4">
  {% block content %}{% endblock %}
</main>

<footer class="text-center text-muted small py-3 border-top mt-4">
  Bank Reconciler &mdash; Internal Tool
</footer>

<!-- Processing modal -->
<div class="modal fade" id="processingModal" tabindex="-1" data-bs-backdrop="static" data-bs-keyboard="false">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow">
      <div class="modal-body text-center py-5">
        <div class="spinner-border text-primary mb-3" style="width:3rem;height:3rem;" role="status"></div>
        <h5 class="mb-1" id="processingTitle">Processing…</h5>
        <p class="text-muted mb-0" id="processingSubtitle">Please wait while we work on your files.</p>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
(function () {
  const modal = new bootstrap.Modal(document.getElementById('processingModal'));
  const title = document.getElementById('processingTitle');
  const subtitle = document.getElementById('processingSubtitle');

  function showProcessing(t, s) {
    title.textContent = t || 'Processing…';
    subtitle.textContent = s || 'Please wait while we work on your files.';
    modal.show();
  }

  // Intercept all form submits
  document.addEventListener('submit', function (e) {
    const form = e.target;
    const action = form.getAttribute('action') || '';
    if (action.includes('/process')) {
      showProcessing('Analyzing transactions…', 'Loading your spreadsheet and matching bank transactions.');
    } else if (action.includes('/confirm')) {
      showProcessing('Saving reconciliation…', 'Applying your selections and writing the spreadsheet.');
    } else {
      showProcessing('Processing…', 'Please wait.');
    }
  });

  // Hide modal when page becomes visible again (back/forward navigation)
  document.addEventListener('visibilitychange', function () {
    if (!document.hidden) modal.hide();
  });
})();
</script>
{% block scripts %}{% endblock %}
</body>
</html>
